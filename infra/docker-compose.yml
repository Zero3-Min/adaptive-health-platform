services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: health-platform-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
