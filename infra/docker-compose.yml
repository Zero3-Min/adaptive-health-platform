services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: health-platform-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_platform"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    container_name: health-platform-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/health_platform
      # 可选：任配一组后 Agent 走真实 LLM，否则为 mock 模式
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_MODEL_COACH: ${ARK_MODEL_COACH:-}
      ARK_MODEL_REFLECTION: ${ARK_MODEL_REFLECTION:-}
      ARK_MODEL: ${ARK_MODEL:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
